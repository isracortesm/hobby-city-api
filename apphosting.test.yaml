runConfig:
  cpu: 1
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 2

env:
  # Secrets (Asegúrate de que estos nombres existan en Cloud Secret Manager)
  - name: APP_KEYS
    secret: APP_KEYS/versions/latest

  - name: API_TOKEN_SALT
    secret: API_TOKEN_SALT/versions/latest

  - name: ADMIN_JWT_SECRET
    secret: ADMIN_JWT_SECRET/versions/latest

  - name: TRANSFER_TOKEN_SALT
    secret: TRANSFER_TOKEN_SALT/versions/latest

  - name: ENCRYPTION_KEY
    secret: ENCRYPTION_KEY/versions/latest

  - name: JWT_SECRET
    secret: JWT_SECRET/versions/latest

  # Database
  - name: DATABASE_URL
    secret: DATABASE_URL/versions/latest

  - name: DATABASE_SSL
    value: "false"

  - name: DATABASE_FILENAME
    secret: DATABASE_FILENAME/versions/latest

  # Resend
  - name: RESEND_API_KEY
    secret: RESEND_API_KEY/versions/latest

  - name: RESEND_EMAIL_FROM
    secret: RESEND_EMAIL_FROM/versions/latest

  - name: RESEND_EMAIL_REPLY
    secret: RESEND_EMAIL_REPLY/versions/latest

  # Supabase Storage
  - name: SUPABASE_S3_ACCESS_KEY
    secret: SUPABASE_S3_ACCESS_KEY/versions/latest

  - name: SUPABASE_S3_SECRET_KEY
    secret: SUPABASE_S3_SECRET_KEY/versions/latest

  - name: SUPABASE_S3_BUCKET
    secret: SUPABASE_S3_BUCKET/versions/latest

  - name: SUPABASE_S3_URL
    secret: SUPABASE_S3_URL/versions/latest

  - name: SUPABASE_S3_URL_PUBLIC
    secret: SUPABASE_S3_URL_PUBLIC/versions/latest